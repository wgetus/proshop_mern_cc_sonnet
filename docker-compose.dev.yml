services:
  app:
    image: mcr.microsoft.com/playwright:v1.59.1-jammy
    working_dir: /app
    command: >
      sh -c "npm install &&
      npm install --prefix frontend &&
      npm run dev"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 5000
      HOST: 0.0.0.0
      BROWSER: none
      CI: "false"
      CHOKIDAR_USEPOLLING: "true"
      MONGO_URI: mongodb://mongo:27017/proshop
      MONGOMS_VERSION: 7.0.14
      JWT_SECRET: ${JWT_SECRET:-abc123}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
    ports:
      - "3000:3000"
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/frontend/node_modules
      - ./uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    stdin_open: true
    tty: true

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-dev-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  mongo-dev-data:
